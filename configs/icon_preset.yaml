# Icon 生成预设配置
# 定义 Icon 的各种尺寸预设、提示词模板和负面提示词

# 内部 SDXL 生成分辨率（始终使用 1024x1024 获得最佳质量，之后再缩放到目标尺寸）
internal_width: 1024
internal_height: 1024

# 尺寸预设：最终导出尺寸（像素）
sizes:
  small:
    width: 64
    height: 64
  medium:
    width: 128
    height: 128
  large:
    width: 256
    height: 256
  hd:
    width: 512
    height: 512

# 提示词模板，{user_prompt} 会被替换为用户输入的提示词
prompt_template: >
  game UI icon, {user_prompt}, stylized cartoon art style,
  clean design, vibrant colors, centered composition,
  transparent background, high quality, detailed,
  professional game asset, 2D flat icon

# 负面提示词（生成时排除这些内容）
negative_prompt: >
  blurry, low quality, noisy, pixelated, watermark, text, signature,
  ugly, deformed, bad anatomy, extra limbs, duplicate, cropped,
  realistic photo, 3D render, sketch, draft, incomplete,
  busy background, cluttered, dark, muted colors

# 默认生成参数
defaults:
  steps: 30
  guidance_scale: 7.5
  batch_size: 1
