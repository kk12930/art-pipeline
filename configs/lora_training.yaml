# LoRA 训练配置
# 适配本地 RTX 5060 Ti 16G 显存的训练参数

# =============== 基础训练参数 ===============
training:
  # 训练轮数（对于 20~50 张参考图，20 epochs 通常足够）
  epochs: 20
  # 每批次样本数（16G 显存建议设为 1）
  batch_size: 1
  # 梯度累积步数（等效 batch_size = batch_size × gradient_accumulation = 4）
  gradient_accumulation: 4
  # 学习率（LoRA 训练推荐 1e-4）
  learning_rate: 1.0e-4
  # 学习率调度策略（cosine 适合 LoRA 训练）
  lr_scheduler: "cosine"
  # 预热步数
  lr_warmup_steps: 100
  # 混合精度训练（fp16 节省显存）
  mixed_precision: "fp16"
  # 随机种子（设为 null 则每次随机）
  seed: 42

# =============== LoRA 参数 ===============
lora:
  # LoRA rank（越高表达能力越强，但显存占用也越大，推荐 16~64）
  rank: 32
  # LoRA alpha（通常设为 rank 的一半，控制 LoRA 的缩放比例）
  alpha: 16
  # 应用 LoRA 的目标模块（SDXL 的注意力层）
  target_modules:
    - "to_k"
    - "to_q"
    - "to_v"
    - "to_out.0"

# =============== 显存优化 ===============
memory_optimization:
  # 使用 fp16 精度
  fp16: true
  # 缓存 latents（预先计算并缓存 VAE 编码结果，加速训练）
  cache_latents: true
  # 梯度检查点（用计算换显存，训练速度略降但节省约 30% 显存）
  gradient_checkpointing: true
  # 使用 8-bit Adam 优化器（需安装 bitsandbytes，进一步节省显存）
  use_8bit_adam: true

# =============== 数据设置 ===============
data:
  # 训练图片分辨率（SDXL 使用 1024x1024）
  resolution: 1024
  # 数据加载并发数
  num_workers: 2
  # 是否随机翻转增强
  flip_augmentation: true
  # 重复数据集次数（小数据集建议重复多次）
  dataset_repeats: 10

# =============== 风格触发词 ===============
# 在提示词中使用此触发词来激活 LoRA 风格
trigger_word: "mystyle"

# =============== 保存设置 ===============
save:
  # 每隔多少 epoch 保存一次中间权重
  save_every_n_epochs: 5
  # 最多保留多少个中间权重（防止磁盘占用过大）
  max_saved_models: 3
  # 输出目录（相对于项目根目录）
  output_dir: "models/lora"
