# UI 设计图生成预设配置
# 定义 UI 设计图的各种尺寸预设、提示词模板和负面提示词

# 内部 SDXL 生成分辨率（使用 1024x1792 竖屏比例，适合移动端 UI）
internal_width: 1024
internal_height: 1792

# 尺寸预设：最终导出分辨率（像素）
sizes:
  mobile_portrait:
    width: 1080
    height: 1920
  mobile_landscape:
    width: 1920
    height: 1080
  ipad:
    width: 2048
    height: 1536

# 提示词模板，{user_prompt} 会被替换为用户输入的提示词
prompt_template: >
  mobile game UI design, {user_prompt}, stylized cartoon art,
  clean layout, vibrant color scheme, polished UI elements,
  buttons, panels, decorative frames, game interface,
  high quality, professional design, detailed artwork

# 负面提示词（生成时排除这些内容）
negative_prompt: >
  blurry, low quality, noisy, watermark, text overlay, signature,
  ugly, deformed, photo realistic, 3D render, sketch, draft,
  incomplete, random elements, cluttered, dark theme,
  web design, flat material design, minimalist

# 默认生成参数
defaults:
  steps: 35
  guidance_scale: 8.0
  batch_size: 1
